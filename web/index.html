<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Rizz messenger">
  <meta name="google-signin-client_id" content="931475441186-h5gh1fo9hn6v3e2cddj2dq689m624qpd.apps.googleusercontent.com">
  <meta name="google-signin-scope" content="profile email">

  <!-- Content Security Policy: обязательно для загрузки Firebase, CanvasKit и шрифтов -->
  <meta http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://accounts.google.com;
               style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com;
               font-src 'self' https://fonts.gstatic.com;
               connect-src 'self' https://*.firebaseio.com https://*.firebase.com wss://*.firebaseio.com https://accounts.google.com https://www.gstatic.com https://fonts.gstatic.com https://*.googleapis.com;
               img-src 'self' data: https://*.googleusercontent.com;
               media-src 'self' data:;">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="rizz" />
  <link rel="manifest" href="/favicon/site.webmanifest" />

  <title>Rizz Web</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Стили для экрана загрузки (без изменений) */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #loading {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      text-align: center;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top-color: #4285F4;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #error-message {
      display: none;
      color: #ff6b6b;
      margin-top: 20px;
      max-width: 300px;
    }
  </style>
</head>
<body>
  <!-- Экран загрузки -->
  <div id="loading">
    <div class="spinner"></div>
    <div>Загрузка Rizz...</div>
    <div id="error-message">
      ⚠️ Не удалось загрузить приложение.<br>
      Проверьте подключение к интернету и попробуйте перезагрузить страницу.
    </div>
  </div>

  <!-- Скрипт для показа ошибки при сбоях (без изменений) -->
  <script>
    (function() {
      var loading = document.getElementById('loading');
      var error = document.getElementById('error-message');

      var timeout = setTimeout(function() {
        if (error) error.style.display = 'block';
      }, 10000);

      window.addEventListener('error', function(e) {
        if (error) error.style.display = 'block';
        clearTimeout(timeout);
      }, true);

      if (window.MutationObserver) {
        var observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.removedNodes) {
              mutation.removedNodes.forEach(function(node) {
                if (node.id === 'loading') {
                  clearTimeout(timeout);
                  observer.disconnect();
                }
              });
            }
          });
        });
        observer.observe(document.body, { childList: true });
      }
    })();
  </script>

  <!-- Основные скрипты -->
  <script src="flutter_bootstrap.js" async></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
